<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2d0a5e"/>
      <stop offset="100%" stop-color="#070514"/>
    </radialGradient>
    <radialGradient id="coin" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffe566"/>
      <stop offset="55%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#c67c0d"/>
    </radialGradient>
    <filter id="glow">
