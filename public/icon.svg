  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="190" fill="rgba(250,204,21,0.15)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="160" fill="url(#coin)"/>
  <circle cx="256" cy="256" r="118" fill="#e8930a" opacity="0.9"/>
