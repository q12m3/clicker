server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # index.html — никогда не кэшировать (чтобы браузер всегда брал свежий)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # manifest — тоже не кэшировать (нужен для корректного обновления SW)
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # SPA routing — все пути отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэш для статики (JS, CSS, картинки)
    location ~* \.(js|css|png|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service Worker не кэшировать
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
}
